worker_processes auto;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    gzip            on;

    # ── Upstream: two Node.js backend instances ─────────────────
    upstream backend_pool {
        # ip_hash ensures a client always hits the same instance
        # when NOT using the Redis adapter. With Redis adapter,
        # any strategy works; we use least_conn for efficiency.
        least_conn;
        server backend-1:3000 max_fails=3 fail_timeout=30s;
        server backend-2:3000 max_fails=3 fail_timeout=30s;
    }

    # ── Rate limiting ────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # ── Main server block ────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Serve static client files
        root   /usr/share/nginx/html;
        index  index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── REST API proxy ───────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://backend_pool/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Socket.IO (WebSocket + polling) ─────────────────────
        # Socket.IO uses /socket.io/* for transport negotiation
        location /socket.io/ {
            proxy_pass         http://backend_pool;
            proxy_http_version 1.1;

            # Required for WebSocket upgrade
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;

            proxy_read_timeout  3600s;  # keep WS connections alive
            proxy_send_timeout  3600s;

            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
