version: "3.8"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL with logical replication enabled
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: orders_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ordersdb
      POSTGRES_USER: ordersuser
      POSTGRES_PASSWORD: orderspass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      postgres
        -c wal_level=logical
        -c max_wal_senders=10
        -c max_replication_slots=10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ordersuser -d ordersdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Zookeeper (required by Kafka)
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: orders_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Apache Kafka
  # ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: orders_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────
  # Debezium Connect (CDC Engine)
  # ─────────────────────────────────────────────
  debezium:
    image: debezium/connect:2.4
    container_name: orders_debezium
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: debezium-group
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_status
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────────
  # Connector Registration (one-shot init)
  # ─────────────────────────────────────────────
  connector-init:
    image: curlimages/curl:latest
    container_name: connector_init
    depends_on:
      debezium:
        condition: service_healthy
    volumes:
      - ./debezium/connector.json:/connector.json
    command: >
      sh -c "curl -s -X POST http://debezium:8083/connectors
        -H 'Content-Type: application/json'
        -d @/connector.json &&
        echo 'Connector registered successfully'"
    restart: "no"

  # ─────────────────────────────────────────────
  # Redis (Socket.IO adapter for horizontal scale)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: orders_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Node.js Backend (2 replicas for NGINX LB demo)
  # ─────────────────────────────────────────────
  backend-1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orders_backend_1
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 3000
      INSTANCE_ID: backend-1
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: dbserver1.public.orders
      KAFKA_GROUP_ID: orders-gateway-group
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orders_backend_2
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 3000
      INSTANCE_ID: backend-2
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: dbserver1.public.orders
      KAFKA_GROUP_ID: orders-gateway-group
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # NGINX Load Balancer
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: orders_nginx
    restart: unless-stopped
    depends_on:
      - backend-1
      - backend-2
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./client:/usr/share/nginx/html:ro

volumes:
  postgres_data:
